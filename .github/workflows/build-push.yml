name: Build & Push Web → GHCR

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: claudygod-musicministries/cgm-web

jobs:
  # ─── Build + Push ────────────────────────────────────────────────────────────
  build:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      short-sha: ${{ steps.sha.outputs.short }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=ref,event=pr,prefix=pr-
          labels: |
            org.opencontainers.image.title=ClaudyGod Web
            org.opencontainers.image.description=ClaudyGod Music Ministry – Next.js 14 frontend
            org.opencontainers.image.vendor=ClaudyGod-MusicMinistries

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./ClaudyGodWebApp
          file: ./ClaudyGodWebApp/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # NEXT_PUBLIC_ vars baked in at build time (Next.js static optimisation)
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || 'https://api.claudygod.org' }}
            NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL || 'https://claudygod.org' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        if: github.event_name != 'pull_request'
        run: |
          echo "### ✅ Web image pushed to GHCR" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Tags | \`latest\`, \`sha-${{ steps.sha.outputs.short }}\` |" >> $GITHUB_STEP_SUMMARY

  # ─── SSH deploy to production server ─────────────────────────────────────────
  deploy:
    name: Deploy Web to production
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          timeout: 180s
          script: |
            set -e
            cd ${{ secrets.VPS_DEPLOY_PATH }}

            # Authenticate to GHCR so docker can pull the new image
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Deploy only the web service (API stays running)
            export TAG="sha-${{ needs.build.outputs.short-sha }}"
            ./scripts/deploy.sh --web-only

            echo "✓ Web deploy complete — $(date -u +%Y-%m-%dT%H:%M:%SZ)"
