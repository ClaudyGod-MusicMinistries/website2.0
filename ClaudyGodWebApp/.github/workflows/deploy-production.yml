name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to deploy (default: latest)'
        required: false
        default: 'latest'
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    name: Deploy → Production VPS
    runs-on: ubuntu-latest
    environment: production
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag || 'latest' }}"
          else
            # On push to main, use commit SHA as tag
            TAG="${{ github.sha }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Deploy tag: $TAG"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        id: deploy
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          timeout: 300s
          envs: REGISTRY,IMAGE_NAME,TAG
          script: |
            set -euo pipefail

            # Colors for output
            GREEN='\033[0;32m'
            RED='\033[0;31m'
            YELLOW='\033[1;33m'
            NC='\033[0m'

            DEPLOY_PATH="${{ secrets.VPS_DEPLOY_PATH }}"
            TAG="${{ steps.tag.outputs.tag }}"
            REGISTRY="${{ env.REGISTRY }}"
            IMAGE_NAME="${{ env.IMAGE_NAME }}"

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo -e "${YELLOW}ClaudyGod Web Application Deployment${NC}"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo -e "${YELLOW}Configuration:${NC}"
            echo "  • Image: $REGISTRY/$IMAGE_NAME:$TAG"
            echo "  • Deploy Path: $DEPLOY_PATH"
            echo "  • Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo ""

            cd "$DEPLOY_PATH" || { echo -e "${RED}✗ Deploy path not found${NC}"; exit 1; }

            # CRITICAL: Fix or remove corrupted .env file BEFORE anything else
            echo -e "${YELLOW}→ Checking .env file integrity...${NC}"
            if [ -f ".env" ]; then
              if ! bash -n ".env" 2>/dev/null; then
                echo -e "${RED}⚠️  .env file has syntax errors, backing up and recreating...${NC}"
                cp ".env" ".env.corrupted.$(date +%Y%m%d_%H%M%S)"
                rm -f ".env"
              else
                echo -e "${GREEN}✓ .env syntax OK, backing up...${NC}"
                cp ".env" ".env.backup.$(date +%Y%m%d_%H%M%S)"
              fi
            fi

            # Create clean .env file with valid syntax
            echo -e "${YELLOW}→ Creating clean .env configuration...${NC}"
            cat > .env << 'ENVFILE'
NODE_ENV=production
NEXT_PUBLIC_SITE_URL=https://claudygod.com
NEXT_PUBLIC_API_URL=https://api.claudygod.com
NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY=pk_live_key_placeholder
PAYSTACK_SECRET_KEY=sk_live_key_placeholder
ENVFILE

            # Validate .env syntax strictly
            echo -e "${YELLOW}→ Validating .env syntax...${NC}"
            if ! bash -n .env 2>&1; then
              echo -e "${RED}✗ .env syntax error - critical failure${NC}"
              echo "File contents:"
              cat .env
              exit 1
            fi
            echo -e "${GREEN}✓ .env syntax is valid${NC}"
            echo ""

            # Show .env for verification
            echo -e "${YELLOW}→ Environment configuration:${NC}"
            cat .env
            echo ""

            # Authenticate with GHCR
            echo -e "${YELLOW}→ Authenticating with GitHub Container Registry...${NC}"
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login "$REGISTRY" -u "${{ github.actor }}" --password-stdin >/dev/null 2>&1
            [ $? -eq 0 ] && echo -e "${GREEN}✓ Authenticated${NC}" || { echo -e "${RED}✗ Authentication failed${NC}"; exit 1; }

            # Pull latest image
            echo -e "${YELLOW}→ Pulling image from GHCR...${NC}"
            FULL_IMAGE="$REGISTRY/$IMAGE_NAME:$TAG"
            docker pull "$FULL_IMAGE" || { echo -e "${RED}✗ Failed to pull image${NC}"; exit 1; }
            echo -e "${GREEN}✓ Image pulled successfully${NC}"

            # Get image digest for verification
            IMAGE_DIGEST=$(docker inspect --format='{{.Id}}' "$FULL_IMAGE" | cut -d: -f2 | head -c 12)
            echo "  • Image digest: $IMAGE_DIGEST"
            echo ""

            # Set environment variable for docker-compose
            export FRONTEND_IMAGE="$FULL_IMAGE"

            # Stop old container gracefully
            echo -e "${YELLOW}→ Stopping current web container...${NC}"
            docker compose down web 2>/dev/null || true
            sleep 2

            # Start new container
            echo -e "${YELLOW}→ Starting new web container...${NC}"
            docker compose up --no-deps --remove-orphans -d web || { echo -e "${RED}✗ Failed to start container${NC}"; exit 1; }
            echo -e "${GREEN}✓ Container started${NC}"
            echo ""

            # Wait for container to be healthy
            echo -e "${YELLOW}→ Waiting for container health check...${NC}"
            HEALTH_CHECK_TRIES=0
            MAX_TRIES=30
            while [ $HEALTH_CHECK_TRIES -lt $MAX_TRIES ]; do
              if docker compose exec -T web wget -qO- http://localhost:3000/ >/dev/null 2>&1; then
                echo -e "${GREEN}✓ Health check passed${NC}"
                break
              fi
              HEALTH_CHECK_TRIES=$((HEALTH_CHECK_TRIES + 1))
              echo "  • Attempt $HEALTH_CHECK_TRIES/$MAX_TRIES..."
              sleep 2
            done

            if [ $HEALTH_CHECK_TRIES -ge $MAX_TRIES ]; then
              echo -e "${RED}✗ Health check timeout${NC}"
              exit 1
            fi
            echo ""

            # Prune old images to save disk space
            echo -e "${YELLOW}→ Cleaning up old images...${NC}"
            docker image prune -f --filter "until=48h" >/dev/null
            echo -e "${GREEN}✓ Cleanup complete${NC}"
            echo ""

            # Show deployment status
            echo -e "${YELLOW}→ Current container status:${NC}"
            docker compose ps web
            echo ""

            echo -e "${GREEN}━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━${NC}"
            echo -e "${GREEN}✓ Deployment completed successfully${NC}"
            echo -e "${GREEN}━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━${NC}"

      - name: Verify deployment
        if: success()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Web App Deployed Successfully**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Time**: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY

      - name: Send Slack notification (Success)
        if: success()
        uses: slackapi/slack-github-action@v2
        continue-on-error: true
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "✅ *ClaudyGod Web App — Deployed to Production*\n• Tag: `${{ steps.tag.outputs.tag }}`\n• Commit: `${{ github.sha }}`\n• Branch: `${{ github.ref_name }}`\n• <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
                  }
                }
              ]
            }

      - name: Send Slack notification (Failure)
        if: failure()
        uses: slackapi/slack-github-action@v2
        continue-on-error: true
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "❌ *ClaudyGod Web App — Deployment Failed*\n• Tag: `${{ steps.tag.outputs.tag }}`\n• Commit: `${{ github.sha }}`\n• <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>"
                  }
                }
              ]
            }
