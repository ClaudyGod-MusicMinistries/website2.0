name: Build & Deploy → Production

on:
  push:
    branches: [main]        # automatic deploy on merge to main
  workflow_dispatch:
    inputs:
      skip_build:
        description: 'Skip Docker build — deploy the existing :latest image as-is'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      # Note: workflow_dispatch always deploys :latest (the last successful main build).
      # To test a feature branch, merge to main first or run build-and-push.yml to
      # push the branch image to GHCR, then trigger this workflow with skip_build=true.

concurrency:
  group: production
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/claudygod-musicministries/cgm-web
  IMAGE_NAME: ${{ github.repository }}

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# JOB 1 — Build & push image to GHCR
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
jobs:
  build:
    name: Build & Push image
    runs-on: ubuntu-latest
    if: github.event.inputs.skip_build != 'true'
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:latest

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
          build-args: |
            NODE_ENV=production
            NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL || 'https://claudygod.com' }}
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL || 'https://api.claudygod.com' }}
            NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY=${{ secrets.NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY || '' }}

      - name: Build summary
        if: always()
        run: |
          {
            echo "## 🐳 Docker Build"
            echo "| | |"
            echo "|---|---|"
            echo "| **Image** | \`${{ env.IMAGE }}\` |"
            echo "| **Tags** | \`${{ steps.meta.outputs.tags }}\` |"
            echo "| **Digest** | \`${{ steps.build.outputs.digest }}\` |"
          } >> $GITHUB_STEP_SUMMARY

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# JOB 2 — Deploy to VPS (always runs after build)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  deploy:
    name: Deploy → Production VPS
    runs-on: ubuntu-latest
    needs: [build]
    # Run if build succeeded, OR if build was skipped (skip_build=true)
    if: always() && (needs.build.result == 'success' || needs.build.result == 'skipped')
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Workflow info
        run: |
          echo "✅ deploy-production.yml — $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "   Event: ${{ github.event_name }}"
          echo "   SHA:   ${{ github.sha }}"
          echo "   Image: ${{ env.IMAGE }}:latest"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          timeout: 300s
          script: |
            set -euo pipefail

            GREEN='\033[0;32m'; RED='\033[0;31m'; YELLOW='\033[1;33m'; NC='\033[0m'

            DEPLOY_PATH="${{ secrets.VPS_DEPLOY_PATH }}"
            FULL_IMAGE="${{ env.IMAGE }}:latest"

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo -e "${YELLOW}ClaudyGod Web — Production Deploy${NC}"
            echo "  Image: $FULL_IMAGE"
            echo "  Path:  $DEPLOY_PATH"
            echo "  Time:  $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            cd "$DEPLOY_PATH" || { echo -e "${RED}✗ Deploy path not found: $DEPLOY_PATH${NC}"; exit 1; }

            [ -f ".env" ] \
              && echo -e "${GREEN}✓  .env found${NC}" \
              || { echo -e "${RED}✗  .env missing${NC}"; exit 1; }

            command -v docker &>/dev/null \
              && echo -e "${GREEN}✓  Docker available${NC}" \
              || { echo -e "${RED}✗  Docker not installed${NC}"; exit 1; }

            docker network ls --format '{{.Name}}' | grep -q '^traefik-public$' \
              || docker network create traefik-public

            # Authenticate to GHCR
            for attempt in 1 2 3; do
              if echo "${{ secrets.GITHUB_TOKEN }}" | \
                   docker login ghcr.io -u "${{ github.actor }}" --password-stdin 2>&1; then
                echo -e "${GREEN}✓  GHCR authenticated${NC}"; break
              fi
              [ $attempt -lt 3 ] && sleep 10 || { echo -e "${RED}✗  Auth failed${NC}"; exit 1; }
            done

            # Update image tag in .env
            sed -i "s|^FRONTEND_IMAGE=.*|FRONTEND_IMAGE=$FULL_IMAGE|" .env
            echo -e "${GREEN}✓  FRONTEND_IMAGE → $FULL_IMAGE${NC}"

            # Pull new image
            for attempt in 1 2 3; do
              docker pull "$FULL_IMAGE" && break
              [ $attempt -lt 3 ] && sleep 15 || { echo -e "${RED}✗  Pull failed${NC}"; exit 1; }
            done
            DIGEST=$(docker inspect --format='{{.Id}}' "$FULL_IMAGE" | cut -d: -f2 | head -c 12)
            echo -e "${GREEN}✓  Image pulled — $DIGEST${NC}"

            # Backup .env
            cp .env ".env.bak.$(date +%Y%m%d_%H%M%S)"

            # Deploy
            docker compose -f docker/docker-compose.yml up -d --no-deps --pull never web \
              || { echo -e "${RED}✗  Failed to start web${NC}"; exit 1; }
            echo -e "${GREEN}✓  web service started${NC}"

            # Health check
            ATTEMPTS=0
            while [ $ATTEMPTS -lt 30 ]; do
              docker compose -f docker/docker-compose.yml exec -T web \
                wget -qO- http://localhost:3000/api/healthz >/dev/null 2>&1 \
                && { echo -e "${GREEN}✓  Health check passed${NC}"; break; }
              ATTEMPTS=$((ATTEMPTS + 1))
              echo "  • $ATTEMPTS/30..."
              sleep 2
            done
            [ $ATTEMPTS -ge 30 ] && { echo -e "${RED}✗  Health check timeout${NC}"; exit 1; }

            # Cleanup old images
            docker image prune -f --filter "until=48h" >/dev/null
            echo -e "${GREEN}✓  Old images pruned${NC}"

            echo ""
            docker compose -f docker/docker-compose.yml ps
            echo ""
            echo -e "${GREEN}━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━${NC}"
            echo -e "${GREEN}✓  Deployed — $(date -u +%Y-%m-%dT%H:%M:%SZ)${NC}"
            echo -e "${GREEN}━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━${NC}"

      - name: Step summary
        if: success()
        run: |
          {
            echo "## ✅ Deployed to Production"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Image** | \`${{ env.IMAGE }}:latest\` |"
            echo "| **Commit** | \`${{ github.sha }}\` |"
            echo "| **Branch** | \`${{ github.ref_name }}\` |"
            echo "| **Time** | $(date -u +%Y-%m-%dT%H:%M:%SZ) |"
          } >> $GITHUB_STEP_SUMMARY

      - name: Slack — success
        if: success()
        uses: slackapi/slack-github-action@v2
        continue-on-error: true
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [{
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "✅ *ClaudyGod Web — Deployed to Production*\n• Image: `${{ env.IMAGE }}:latest`\n• Commit: `${{ github.sha }}`\n• <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
                }
              }]
            }

      - name: Slack — failure
        if: failure()
        uses: slackapi/slack-github-action@v2
        continue-on-error: true
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [{
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "❌ *ClaudyGod Web — Deploy Failed*\n• Commit: `${{ github.sha }}`\n• <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>"
                }
              }]
            }
