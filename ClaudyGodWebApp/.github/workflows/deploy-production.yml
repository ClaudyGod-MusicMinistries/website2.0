name: Deploy to Production

on:
  # Automatically deploy AFTER the build succeeds — prevents race condition
  # where deploy runs before the image exists in GHCR.
  workflow_run:
    workflows: ["Build & Push to GHCR"]
    types: [completed]
    branches: [main]

  # Manual trigger — useful for rollbacks or forced redeploys.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to deploy (default: latest)'
        required: false
        default: 'latest'
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: true   # cancel any queued/running deploy when a newer one arrives

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    name: Deploy → Production VPS
    runs-on: ubuntu-latest
    environment: production
    # For workflow_run events: only proceed when the build actually succeeded
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Workflow version check
        run: |
          echo "✅ deploy-production.yml v3 — $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "   Triggered by: ${{ github.event_name }}"
          echo "   SHA: ${{ github.sha }}"

      - name: Determine image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag || 'latest' }}"
          else
            # workflow_run: build always tags 'latest' for main branch pushes
            TAG="latest"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Deploy tag: $TAG"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        id: deploy
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          timeout: 300s
          envs: REGISTRY,IMAGE_NAME,TAG
          script: |
            set -euo pipefail

            GREEN='\033[0;32m'
            RED='\033[0;31m'
            YELLOW='\033[1;33m'
            NC='\033[0m'

            DEPLOY_PATH="${{ secrets.VPS_DEPLOY_PATH }}"
            TAG="${{ steps.tag.outputs.tag }}"
            REGISTRY="${{ env.REGISTRY }}"
            IMAGE_NAME="${{ env.IMAGE_NAME }}"

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo -e "${YELLOW}ClaudyGod Infrastructure Deployment${NC}"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo -e "${YELLOW}Configuration:${NC}"
            echo "  • Frontend Image: $REGISTRY/$IMAGE_NAME:$TAG"
            echo "  • Deploy Path: $DEPLOY_PATH"
            echo "  • Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo ""

            cd "$DEPLOY_PATH" || { echo -e "${RED}✗ Deploy path not found${NC}"; exit 1; }

            # ━━━ PRE-FLIGHT CHECKS ━━━
            echo "━━━ PRE-FLIGHT CHECKS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            [ -f ".env" ] && echo -e "${GREEN}✓  .env file found${NC}" \
              || { echo -e "${RED}✗  .env not found — run: cp .env.example .env${NC}"; exit 1; }

            command -v docker &>/dev/null \
              && echo -e "${GREEN}✓  Docker + Compose v2 are running${NC}" \
              || { echo -e "${RED}✗  Docker not installed${NC}"; exit 1; }

            if docker network ls --format '{{.Name}}' | grep -q '^traefik-public$'; then
              echo -e "${GREEN}✓  traefik-public network exists${NC}"
            else
              echo -e "${YELLOW}⚠  traefik-public missing — creating${NC}"
              docker network create traefik-public
              echo -e "${GREEN}✓  traefik-public network created${NC}"
            fi

            # ━━━ UPDATE FRONTEND IMAGE TAG ━━━
            echo -e "${YELLOW}→  Updating FRONTEND_IMAGE in .env...${NC}"
            sed -i "s|^FRONTEND_IMAGE=.*|FRONTEND_IMAGE=$REGISTRY/$IMAGE_NAME:$TAG|" .env
            echo -e "${GREEN}✓  FRONTEND_IMAGE → $REGISTRY/$IMAGE_NAME:$TAG${NC}"
            echo ""

            # ━━━ AUTHENTICATE TO GHCR ━━━
            echo -e "${YELLOW}→  Authenticating with GitHub Container Registry...${NC}"
            # Retry up to 3 times — handles transient TLS/network blips
            for attempt in 1 2 3; do
              if echo "${{ secrets.GITHUB_TOKEN }}" | \
                   docker login "$REGISTRY" -u "${{ github.actor }}" --password-stdin 2>&1; then
                echo -e "${GREEN}✓  Authenticated${NC}"
                break
              fi
              if [ $attempt -lt 3 ]; then
                echo -e "${YELLOW}  ⟳  Attempt $attempt failed — retrying in 10s...${NC}"
                sleep 10
              else
                echo -e "${RED}✗  Authentication failed after 3 attempts${NC}"
                echo "    Hint: check VPS outbound HTTPS connectivity — run: curl -v https://ghcr.io/v2/"
                exit 1
              fi
            done

            # ━━━ PULL IMAGE ━━━
            echo -e "${YELLOW}→  Pulling images from GHCR...${NC}"
            FULL_IMAGE="$REGISTRY/$IMAGE_NAME:$TAG"
            # Retry pull up to 3 times — large images can time out on first attempt
            for attempt in 1 2 3; do
              if docker pull "$FULL_IMAGE"; then
                break
              fi
              if [ $attempt -lt 3 ]; then
                echo -e "${YELLOW}  ⟳  Pull attempt $attempt failed — retrying in 15s...${NC}"
                sleep 15
              else
                echo -e "${RED}✗  Failed to pull image after 3 attempts${NC}"
                echo "    Image: $FULL_IMAGE"
                echo "    Hint: run on VPS:  docker pull $FULL_IMAGE"
                exit 1
              fi
            done
            IMAGE_DIGEST=$(docker inspect --format='{{.Id}}' "$FULL_IMAGE" | cut -d: -f2 | head -c 12)
            echo -e "${GREEN}✓  Image pulled — digest: $IMAGE_DIGEST${NC}"
            echo ""

            # ━━━ BACKUP .env ━━━
            cp .env ".env.bak.$(date +%Y%m%d_%H%M%S)"

            # ━━━ DEPLOY ━━━
            echo -e "${YELLOW}→  Deploying services...${NC}"
            docker compose -f docker/docker-compose.yml down web 2>/dev/null || true
            sleep 2
            docker compose -f docker/docker-compose.yml up -d web \
              || { echo -e "${RED}✗  Failed to start web service${NC}"; exit 1; }
            echo -e "${GREEN}✓  Web service started${NC}"
            echo ""

            # ━━━ HEALTH CHECK ━━━
            echo -e "${YELLOW}→  Waiting for service health check...${NC}"
            ATTEMPTS=0; MAX=30
            while [ $ATTEMPTS -lt $MAX ]; do
              if docker compose -f docker/docker-compose.yml exec -T web \
                   wget -qO- http://localhost:3000/api/healthz >/dev/null 2>&1; then
                echo -e "${GREEN}✓  Health check passed${NC}"
                break
              fi
              ATTEMPTS=$((ATTEMPTS + 1))
              echo "  • Attempt $ATTEMPTS/$MAX..."
              sleep 2
            done

            if [ $ATTEMPTS -ge $MAX ]; then
              echo -e "${RED}✗  Health check timeout${NC}"; exit 1
            fi
            echo ""

            # ━━━ CLEANUP ━━━
            docker image prune -f --filter "until=48h" >/dev/null
            echo -e "${GREEN}✓  Old images pruned${NC}"

            # ━━━ STATUS ━━━
            echo ""
            docker compose -f docker/docker-compose.yml ps
            echo ""
            echo -e "${GREEN}━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━${NC}"
            echo -e "${GREEN}✓  Deployment completed — $(date -u +%Y-%m-%dT%H:%M:%SZ)${NC}"
            echo -e "${GREEN}━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━${NC}"

      - name: Step summary
        if: success()
        run: |
          echo "## ✅ Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Time**: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY

      - name: Slack — success
        if: success()
        uses: slackapi/slack-github-action@v2
        continue-on-error: true
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [{
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "✅ *ClaudyGod Web App — Deployed to Production*\n• Tag: `${{ steps.tag.outputs.tag }}`\n• Commit: `${{ github.sha }}`\n• Branch: `${{ github.ref_name }}`\n• <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
                }
              }]
            }

      - name: Slack — failure
        if: failure()
        uses: slackapi/slack-github-action@v2
        continue-on-error: true
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [{
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "❌ *ClaudyGod Web App — Deployment Failed*\n• Tag: `${{ steps.tag.outputs.tag }}`\n• Commit: `${{ github.sha }}`\n• <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>"
                }
              }]
            }
