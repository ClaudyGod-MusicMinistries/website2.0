name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to deploy (default: latest)'
        required: false
        default: 'latest'
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    name: Deploy → Production VPS
    runs-on: ubuntu-latest
    environment: production
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag || 'latest' }}"
          else
            # On push to main, use commit SHA as tag
            TAG="${{ github.sha }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Deploy tag: $TAG"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        id: deploy
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          timeout: 300s
          envs: REGISTRY,IMAGE_NAME,TAG
          script: |
            set -euo pipefail

            # Colors for output
            GREEN='\033[0;32m'
            RED='\033[0;31m'
            YELLOW='\033[1;33m'
            NC='\033[0m'

            DEPLOY_PATH="${{ secrets.VPS_DEPLOY_PATH }}"
            TAG="${{ steps.tag.outputs.tag }}"
            REGISTRY="${{ env.REGISTRY }}"
            IMAGE_NAME="${{ env.IMAGE_NAME }}"

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo -e "${YELLOW}ClaudyGod Infrastructure Deployment${NC}"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo -e "${YELLOW}Configuration:${NC}"
            echo "  • Frontend Image: $REGISTRY/$IMAGE_NAME:$TAG"
            echo "  • Deploy Path: $DEPLOY_PATH"
            echo "  • Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo ""

            cd "$DEPLOY_PATH" || { echo -e "${RED}✗ Deploy path not found${NC}"; exit 1; }

            # ━━━ PRE-FLIGHT CHECKS ━━━
            echo -e "${YELLOW}→ Running pre-flight checks...${NC}"

            # Check .env exists
            if [ ! -f ".env" ]; then
              echo -e "${RED}✗ .env file not found${NC}"
              exit 1
            fi
            echo -e "${GREEN}✓ .env file found${NC}"

            # Check Docker
            if ! command -v docker &> /dev/null; then
              echo -e "${RED}✗ Docker not installed${NC}"
              exit 1
            fi
            echo -e "${GREEN}✓ Docker + Compose v2 are running${NC}"

            # Check traefik network
            if ! docker network ls | grep -q traefik-public; then
              echo -e "${RED}✗ traefik-public network not found${NC}"
              exit 1
            fi
            echo -e "${GREEN}✓ traefik-public network exists${NC}"

            # Validate .env syntax
            echo -e "${YELLOW}→ Validating .env file syntax...${NC}"
            if bash -n .env 2>/dev/null; then
              echo -e "${GREEN}✓ .env file syntax is valid${NC}"
              cp ".env" ".env.backup.$(date +%Y%m%d_%H%M%S)"
              echo -e "${GREEN}✓ Backup created${NC}"
            else
              echo -e "${RED}✗ .env file has syntax errors${NC}"
              exit 1
            fi

            # Source .env to get values for validation
            set +a
            source .env
            set -a

            # Validate required variables are set (not CHANGE_ME)
            echo -e "${YELLOW}→ Validating environment variables...${NC}"
            MISSING_VARS=0

            check_var() {
              local var=$1
              local value="${!var:-}"
              if [ -z "$value" ] || [ "$value" = "CHANGE_ME" ] || [[ "$value" == *"CHANGE_ME"* ]]; then
                echo -e "${RED}✗ $var is missing or still set to CHANGE_ME${NC}"
                MISSING_VARS=$((MISSING_VARS + 1))
              else
                echo -e "${GREEN}✓ $var${NC}"
              fi
            }

            check_var "DOMAIN"
            check_var "API_DOMAIN"
            check_var "BACKEND_IMAGE"
            check_var "FRONTEND_IMAGE"
            check_var "SUPABASE_CONNECTION_STRING"
            check_var "REDIS_PASSWORD"
            check_var "JWT_KEY"
            check_var "ENCRYPTION_KEY"
            check_var "EMAIL_SMTP_HOST"
            check_var "EMAIL_SMTP_USERNAME"
            check_var "EMAIL_SMTP_PASSWORD"
            check_var "PAYSTACK_SECRET_KEY"
            check_var "NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY"
            check_var "ANTHROPIC_API_KEY"
            check_var "GRAFANA_ADMIN_PASSWORD"

            if [ $MISSING_VARS -gt 0 ]; then
              echo -e "${RED}✗ Fix the missing variables above before deploying.${NC}"
              exit 1
            fi
            echo ""

            # Update FRONTEND_IMAGE in .env from GitHub Actions
            echo -e "${YELLOW}→ Updating FRONTEND_IMAGE in .env...${NC}"
            sed -i "s|^FRONTEND_IMAGE=.*|FRONTEND_IMAGE=$REGISTRY/$IMAGE_NAME:$TAG|" .env
            echo -e "${GREEN}✓ FRONTEND_IMAGE updated to: $REGISTRY/$IMAGE_NAME:$TAG${NC}"
            echo ""

            # Authenticate with GHCR
            echo -e "${YELLOW}→ Authenticating with GitHub Container Registry...${NC}"
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login "$REGISTRY" -u "${{ github.actor }}" --password-stdin >/dev/null 2>&1
            [ $? -eq 0 ] && echo -e "${GREEN}✓ Authenticated${NC}" || { echo -e "${RED}✗ Authentication failed${NC}"; exit 1; }

            # Pull latest images
            echo -e "${YELLOW}→ Pulling images from GHCR...${NC}"
            FULL_IMAGE="$REGISTRY/$IMAGE_NAME:$TAG"
            docker pull "$FULL_IMAGE" || { echo -e "${RED}✗ Failed to pull image${NC}"; exit 1; }
            echo -e "${GREEN}✓ Frontend image pulled successfully${NC}"

            # Get image digest for verification
            IMAGE_DIGEST=$(docker inspect --format='{{.Id}}' "$FULL_IMAGE" | cut -d: -f2 | head -c 12)
            echo "  • Image digest: $IMAGE_DIGEST"
            echo ""

            # Deploy using docker-compose
            echo -e "${YELLOW}→ Deploying services...${NC}"
            docker compose -f docker/docker-compose.yml down web 2>/dev/null || true
            sleep 2

            docker compose -f docker/docker-compose.yml up -d web || { echo -e "${RED}✗ Failed to start web service${NC}"; exit 1; }
            echo -e "${GREEN}✓ Web service started${NC}"
            echo ""

            # Wait for health check
            echo -e "${YELLOW}→ Waiting for service health check...${NC}"
            HEALTH_CHECK_TRIES=0
            MAX_TRIES=30
            while [ $HEALTH_CHECK_TRIES -lt $MAX_TRIES ]; do
              if docker compose -f docker/docker-compose.yml exec -T web wget -qO- http://localhost:3000/ >/dev/null 2>&1; then
                echo -e "${GREEN}✓ Health check passed${NC}"
                break
              fi
              HEALTH_CHECK_TRIES=$((HEALTH_CHECK_TRIES + 1))
              echo "  • Attempt $HEALTH_CHECK_TRIES/$MAX_TRIES..."
              sleep 2
            done

            if [ $HEALTH_CHECK_TRIES -ge $MAX_TRIES ]; then
              echo -e "${RED}✗ Health check timeout${NC}"
              exit 1
            fi
            echo ""

            # Cleanup
            echo -e "${YELLOW}→ Cleaning up old images...${NC}"
            docker image prune -f --filter "until=48h" >/dev/null
            echo -e "${GREEN}✓ Cleanup complete${NC}"
            echo ""

            # Status
            echo -e "${YELLOW}→ Current service status:${NC}"
            docker compose -f docker/docker-compose.yml ps
            echo ""

            echo -e "${GREEN}━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━${NC}"
            echo -e "${GREEN}✓ Deployment completed successfully${NC}"
            echo -e "${GREEN}━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━${NC}"

      - name: Verify deployment
        if: success()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Web App Deployed Successfully**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Time**: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY

      - name: Send Slack notification (Success)
        if: success()
        uses: slackapi/slack-github-action@v2
        continue-on-error: true
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "✅ *ClaudyGod Web App — Deployed to Production*\n• Tag: `${{ steps.tag.outputs.tag }}`\n• Commit: `${{ github.sha }}`\n• Branch: `${{ github.ref_name }}`\n• <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
                  }
                }
              ]
            }

      - name: Send Slack notification (Failure)
        if: failure()
        uses: slackapi/slack-github-action@v2
        continue-on-error: true
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "❌ *ClaudyGod Web App — Deployment Failed*\n• Tag: `${{ steps.tag.outputs.tag }}`\n• Commit: `${{ github.sha }}`\n• <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>"
                  }
                }
              ]
            }
