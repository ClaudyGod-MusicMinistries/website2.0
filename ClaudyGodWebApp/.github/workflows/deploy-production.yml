name: Deploy Web → Production

on:
  workflow_run:
    workflows: ["Build & Push to GHCR"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to deploy (default: latest)"
        required: false
        default: "latest"
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: false   # never cancel an active deploy

jobs:
  deploy:
    name: Deploy → VPS
    runs-on: ubuntu-latest
    environment: production
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      # ── Resolve image tag ──────────────────────────────────────────────────
      - name: Resolve image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag || 'latest' }}"
          else
            TAG="${{ github.event.workflow_run.head_sha }}"
            TAG="$(echo $TAG | cut -c1-7)"
            TAG="${{ github.event.workflow_run.head_branch }}-${TAG}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Deploying tag: $TAG"

      # ── SSH → VPS ──────────────────────────────────────────────────────────
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          timeout: 300s
          script: |
            set -euo pipefail
            export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"

            # ── colours ───────────────────────────────────────────────────────
            G='\033[0;32m' Y='\033[1;33m' R='\033[0;31m' N='\033[0m'
            ok()   { echo -e "${G}  ✓${N}  $*"; }
            warn() { echo -e "${Y}  ⚠${N}  $*"; }
            die()  { echo -e "${R}  ✗${N}  $*" >&2; exit 1; }
            hdr()  { echo -e "\n${Y}━━ $* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━${N}"; }

            DEPLOY_PATH="${{ secrets.VPS_DEPLOY_PATH }}"
            TAG="${{ steps.tag.outputs.tag }}"
            REGISTRY="ghcr.io"
            IMAGE="ghcr.io/claudygod-musicministries/cgm-web"

            echo ""
            echo -e "${Y}ClaudyGod — Web Deployment${N}"
            echo "  Tag:  $TAG"
            echo "  Path: $DEPLOY_PATH"
            echo "  Time: $(date -u +%Y-%m-%dT%H:%M:%SZ)"

            cd "$DEPLOY_PATH" || die "Deploy path not found: $DEPLOY_PATH"
            [[ -f ".env" ]] || die ".env not found. Run: cp .env.example .env && fill in values."

            # ── Source .env ───────────────────────────────────────────────────
            set -a; source .env; set +a

            # ── Pre-flight: infrastructure ────────────────────────────────────
            hdr "PRE-FLIGHT"
            command -v docker &>/dev/null || die "Docker is not installed."
            ok "Docker available: $(docker --version | cut -d' ' -f3 | tr -d ',')"

            docker network ls --format '{{.Name}}' | grep -q '^traefik-public$' \
              || { warn "traefik-public network missing — creating."; docker network create traefik-public; }
            ok "traefik-public network ready"

            # ── Pre-flight: required variables ────────────────────────────────
            hdr "ENVIRONMENT VALIDATION"
            FAILED=0

            require() {
              local v="$1" val="${!1:-}"
              if [[ -z "$val" || "$val" == *"CHANGE_ME"* ]]; then
                echo -e "${R}  ✗${N}  $v — not set"; FAILED=$((FAILED+1))
              else
                ok "$v"
              fi
            }

            warn_if_missing() {
              local v="$1" val="${!1:-}"
              if [[ -z "$val" || "$val" == *"CHANGE_ME"* ]]; then
                warn "$v — not configured (feature will be disabled)"
              else
                ok "$v"
              fi
            }

            # Core infra — required; deploy will not proceed if any are missing
            require DOMAIN
            require API_DOMAIN
            require POSTGRES_PASSWORD
            require REDIS_PASSWORD
            require JWT_KEY
            require ENCRYPTION_KEY
            require EMAIL_SMTP_USERNAME
            require EMAIL_SMTP_PASSWORD

            # Optional features — warn only, app still starts
            warn_if_missing PAYSTACK_SECRET_KEY
            warn_if_missing ANTHROPIC_API_KEY

            [[ $FAILED -eq 0 ]] || die "$FAILED required variable(s) missing. Aborting."

            # ── Authenticate → GHCR ───────────────────────────────────────────
            hdr "GHCR LOGIN"
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login "$REGISTRY" -u "${{ github.actor }}" --password-stdin 2>&1 \
              | grep -v "WARNING" || true
            ok "Authenticated to GHCR"

            # ── Update IMAGE_WEB in .env ──────────────────────────────────────
            FULL_IMAGE="${IMAGE}:${TAG}"
            if grep -q '^IMAGE_WEB=' .env; then
              sed -i "s|^IMAGE_WEB=.*|IMAGE_WEB=${FULL_IMAGE}|" .env
            else
              echo "IMAGE_WEB=${FULL_IMAGE}" >> .env
            fi
            # Re-source to pick up new value
            set -a; source .env; set +a
            ok "IMAGE_WEB → ${FULL_IMAGE}"

            # ── Pull image ────────────────────────────────────────────────────
            hdr "IMAGE PULL"
            docker pull "$FULL_IMAGE" || die "Failed to pull $FULL_IMAGE"
            DIGEST=$(docker inspect --format='{{.Id}}' "$FULL_IMAGE" | cut -c8-19)
            ok "Pulled: $FULL_IMAGE (digest: $DIGEST)"

            # ── Backup .env ───────────────────────────────────────────────────
            cp .env ".env.bak.$(date +%Y%m%d_%H%M%S)"

            # ── Deploy web service ────────────────────────────────────────────
            hdr "DEPLOY"
            COMPOSE="docker compose --env-file $DEPLOY_PATH/.env -f $DEPLOY_PATH/docker/docker-compose.yml"

            $COMPOSE up -d --no-deps --remove-orphans --pull never web \
              || die "Failed to start web service"
            ok "Web container started"

            # ── Health check ──────────────────────────────────────────────────
            hdr "HEALTH CHECK"
            MAX=24 ATTEMPTS=0 DELAY=5
            until docker compose --env-file $DEPLOY_PATH/.env \
                    -f $DEPLOY_PATH/docker/docker-compose.yml \
                    exec -T web wget -qO- http://localhost:3000/api/healthz &>/dev/null; do
              ATTEMPTS=$((ATTEMPTS+1))
              [[ $ATTEMPTS -ge $MAX ]] && die "Health check timed out after $((MAX*DELAY))s"
              echo "  … waiting ($ATTEMPTS/$MAX)"
              sleep $DELAY
            done
            ok "Health check passed"

            # ── Cleanup ───────────────────────────────────────────────────────
            docker image prune -f --filter "until=48h" >/dev/null
            ok "Old images pruned"

            # ── Summary ───────────────────────────────────────────────────────
            echo ""
            $COMPOSE ps web
            echo ""
            echo -e "${G}━━ DEPLOY COMPLETE — $(date -u +%Y-%m-%dT%H:%M:%SZ) ━━━━━━━━━━━━━━━━━━━${N}"

      # ── GitHub step summary ────────────────────────────────────────────────
      - name: Step summary
        if: success()
        run: |
          {
            echo "## ✅ Web Deployment Successful"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Image** | \`ghcr.io/claudygod-musicministries/cgm-web:${{ steps.tag.outputs.tag }}\` |"
            echo "| **Commit** | \`${{ github.sha }}\` |"
            echo "| **Branch** | \`${{ github.ref_name }}\` |"
            echo "| **Time** | $(date -u +%Y-%m-%dT%H:%M:%SZ) |"
          } >> $GITHUB_STEP_SUMMARY

      # ── Slack — success ────────────────────────────────────────────────────
      - name: Slack — success
        if: success()
        uses: slackapi/slack-github-action@v2
        continue-on-error: true
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [{
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "✅ *ClaudyGod Web — Deployed*\n• Tag: `${{ steps.tag.outputs.tag }}`\n• Commit: `${{ github.sha }}`\n• <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
                }
              }]
            }

      # ── Slack — failure ────────────────────────────────────────────────────
      - name: Slack — failure
        if: failure()
        uses: slackapi/slack-github-action@v2
        continue-on-error: true
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [{
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "❌ *ClaudyGod Web — Deploy Failed*\n• Tag: `${{ steps.tag.outputs.tag }}`\n• <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>"
                }
              }]
            }
