name: Build & Push to GHCR

on:
  # Manual trigger only — for testing builds without deploying.
  # Production deploys are handled by deploy-production.yml (push to main).
  workflow_dispatch:
    inputs:
      push_image:
        description: "Push image to GHCR?"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/claudygod-musicministries/cgm-web

jobs:
  build:
    name: Build & Push web image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      tag:    ${{ steps.meta.outputs.version }}
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:latest

      - name: Log in to GHCR
        if: github.event.inputs.push_image != 'false'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event.inputs.push_image != 'false' && github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
          build-args: |
            NODE_ENV=production
            NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL || 'https://claudygod.com' }}
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL || 'https://api.claudygod.com' }}
            NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY=${{ secrets.NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY || '' }}

      - name: Step summary
        if: always()
        run: |
          {
            echo "## Docker Build Report"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Image** | \`${{ env.IMAGE }}\` |"
            echo "| **Tags** | \`${{ steps.meta.outputs.tags }}\` |"
            echo "| **Digest** | \`${{ steps.build.outputs.digest }}\` |"
            echo "| **Branch** | \`${{ github.ref_name }}\` |"
            echo "| **Commit** | \`${{ github.sha }}\` |"
          } >> $GITHUB_STEP_SUMMARY

  notify:
    name: Notify build status
    needs: build
    runs-on: ubuntu-latest
    if: always()
    continue-on-error: true

    steps:
      - name: Slack — success
        if: needs.build.result == 'success'
        uses: slackapi/slack-github-action@v2
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [{
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "✅ *ClaudyGod Web — Image Built*\n• Tag: `${{ needs.build.outputs.tag }}`\n• Digest: `${{ needs.build.outputs.digest }}`\n• <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
                }
              }]
            }

      - name: Slack — failure
        if: needs.build.result == 'failure'
        uses: slackapi/slack-github-action@v2
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [{
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "❌ *ClaudyGod Web — Build Failed*\n• Branch: `${{ github.ref_name }}`\n• <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>"
                }
              }]
            }
