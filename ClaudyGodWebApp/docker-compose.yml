services:

  # ── Next.js Application ───────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://claudygod.com}
        NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY: ${NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY:-}
    image: claudygod-web:latest
    container_name: claudygod_web
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      PAYSTACK_SECRET_KEY: ${PAYSTACK_SECRET_KEY}
      NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY: ${NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://claudygod.com}
    env_file:
      - .env.local
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - cgm_net

  # ── Nginx Reverse Proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: claudygod_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro          # Mount TLS certs (Let's Encrypt / manual)
      - nginx_cache:/var/cache/nginx
    depends_on:
      web:
        condition: service_healthy
    networks:
      - cgm_net

networks:
  cgm_net:
    driver: bridge

volumes:
  nginx_cache:
