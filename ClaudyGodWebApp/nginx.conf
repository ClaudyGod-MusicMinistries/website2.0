# ─── Nginx Production Config — ClaudyGod Music Ministries ────────────────────

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
  worker_connections  1024;
  multi_accept        on;
  use                 epoll;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ── Logging ────────────────────────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent"';
  access_log /var/log/nginx/access.log main;

  # ── Performance ────────────────────────────────────────────────────────────
  sendfile            on;
  tcp_nopush          on;
  tcp_nodelay         on;
  keepalive_timeout   65;
  types_hash_max_size 2048;
  server_tokens       off;

  # ── Compression ────────────────────────────────────────────────────────────
  gzip              on;
  gzip_vary         on;
  gzip_proxied      any;
  gzip_comp_level   6;
  gzip_buffers      16 8k;
  gzip_http_version 1.1;
  gzip_types
    text/plain text/css text/xml text/javascript
    application/json application/javascript application/xml
    application/rss+xml application/atom+xml
    image/svg+xml font/woff font/woff2;

  # ── Rate limiting ──────────────────────────────────────────────────────────
  limit_req_zone  $binary_remote_addr zone=api:10m rate=20r/s;
  limit_req_zone  $binary_remote_addr zone=general:10m rate=60r/s;
  limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

  # ── Proxy cache — DISABLED for HTML pages (only for static assets) ─────────
  # Cache configuration for static assets only
  proxy_cache_path /var/cache/nginx
    levels=1:2
    keys_zone=next_cache:10m
    max_size=1g
    inactive=7d
    use_temp_path=off;

  # ─── Upstream ──────────────────────────────────────────────────────────────
  upstream nextjs {
    server web:3000;
    keepalive 32;
  }

  # ─── HTTP → HTTPS redirect ─────────────────────────────────────────────────
  server {
    listen 80;
    server_name claudygod.com www.claudygod.com;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ─── Main HTTPS server ─────────────────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name claudygod.com www.claudygod.com;

    # ── TLS ──────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options            "SAMEORIGIN"            always;
    add_header X-Content-Type-Options     "nosniff"               always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy
      "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.paystack.co https://www.youtube.com; frame-src https://www.youtube.com https://js.paystack.co; img-src 'self' data: blob: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://api.paystack.co; media-src 'self' https:;"
      always;

    # www → non-www
    if ($host = www.claudygod.com) {
      return 301 https://claudygod.com$request_uri;
    }

    # ── Connection limits ────────────────────────────────────────────────────
    limit_conn conn_limit 20;
    limit_req  zone=general burst=30 nodelay;

    # ── Static assets — long cache ────────────────────────────────────────────
    location /_next/static/ {
      proxy_pass http://nextjs;
      proxy_cache        next_cache;
      proxy_cache_valid  200 365d;
      add_header Cache-Control "public, max-age=31536000, immutable";
      add_header X-Cache-Status $upstream_cache_status;
      proxy_set_header Host $host;
    }

    # ── Public folder assets ─────────────────────────────────────────────────
    location ~* \.(webp|jpg|jpeg|png|gif|svg|ico|woff|woff2|ttf|otf|mp4|webm)$ {
      proxy_pass http://nextjs;
      proxy_cache       next_cache;
      proxy_cache_valid 200 30d;
      add_header Cache-Control "public, max-age=2592000";
      add_header X-Cache-Status $upstream_cache_status;
      proxy_set_header Host $host;
    }

    # ── API routes — no cache, rate-limited ──────────────────────────────────
    location /api/ {
      limit_req zone=api burst=10 nodelay;
      proxy_pass http://nextjs;

      proxy_http_version 1.1;
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host       $host;
      proxy_set_header X-Real-IP  $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_read_timeout 30s;
      proxy_connect_timeout 5s;
    }

    # ── All other pages ──────────────────────────────────────────────────────
    location / {
      proxy_pass http://nextjs;

      proxy_http_version 1.1;
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host       $host;
      proxy_set_header X-Real-IP  $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_read_timeout 60s;
      proxy_connect_timeout 5s;
      proxy_send_timeout 60s;

      # CRITICAL: Disable ALL caching for HTML pages
      proxy_no_cache 1;
      proxy_cache_bypass 1;
      proxy_set_header Cache-Control "no-cache, no-store, must-revalidate";

      # Aggressive cache-busting headers
      add_header Cache-Control "no-cache, no-store, must-revalidate, max-age=0" always;
      add_header Pragma "no-cache" always;
      add_header Expires "0" always;
      add_header X-Cache-Control "no-cache" always;
    }
  }
}
